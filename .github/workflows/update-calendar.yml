name: Update calendar

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest -v

  update:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate ICS feeds
        id: generate
        run: python generate_ics.py

      - name: Commit if changed
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update calendar feeds"
            git push
          fi

      # Open/update a tracking issue when generation crashes (hard failure) or
      # quietly degrades (entries fell back to all-day, or detail scrapes
      # failed — usually a sign the unofficial upstream changed). Closes the
      # issue automatically on the next clean run.
      - name: Notify on failure or degradation
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'calendar-pipeline';
            const failed = '${{ steps.generate.outcome }}' === 'failure';
            const degraded = '${{ steps.generate.outputs.degraded }}' === 'true';
            const total = '${{ steps.generate.outputs.total_events }}';
            const fallback = '${{ steps.generate.outputs.fallback_events }}';
            const detail = '${{ steps.generate.outputs.detail_failures }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo, name: label, color: 'd73a4a',
                description: 'Calendar generation pipeline alerts',
              });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label,
            });
            const issue = open.data[0];

            if (failed || degraded) {
              const kind = failed
                ? 'Hard failure — generation crashed (see logs).'
                : 'Soft degradation — entries fell back to all-day or detail scrapes failed.';
              const body = [
                `**${kind}**`, '',
                `- Run: ${runUrl}`,
                `- total_events: ${total || 'n/a'}`,
                `- fallback_events: ${fallback || 'n/a'}`,
                `- detail_failures: ${detail || 'n/a'}`,
                '',
                'The unofficial Metro planned-works feed/markup may have changed.',
              ].join('\n');
              if (issue) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number, body,
                });
              } else {
                await github.rest.issues.create({
                  ...context.repo,
                  title: '⚠️ Calendar generation needs attention',
                  labels: [label], body,
                });
              }
            } else if (issue) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: `Recovered — clean run. ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo, issue_number: issue.number, state: 'closed',
              });
            }
