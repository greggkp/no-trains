name: Update calendar

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

# Feeds are published straight to GitHub Pages as a build artifact — nothing
# is pushed back to main, so branch protection on main can stay strict.
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest -v

  update:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Generate ICS feeds
        id: generate
        run: python generate_ics.py

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      # v5+ of upload-pages-artifact SHA-pins its internal upload-artifact,
      # which the repo's required-SHA-pinning policy also applies to.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      # Open/update a tracking issue when the pipeline fails hard (any step —
      # generation crash or deploy failure) or quietly degrades (entries fell
      # back to all-day, or detail scrapes failed — usually a sign the
      # unofficial upstream changed). Closes the issue automatically on the
      # next clean run.
      - name: Notify on failure or degradation
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          # Passed via env rather than interpolated into the script so output
          # values can never be parsed as JavaScript.
          JOB_STATUS: ${{ job.status }}
          DEGRADED: ${{ steps.generate.outputs.degraded }}
          TOTAL_EVENTS: ${{ steps.generate.outputs.total_events }}
          FALLBACK_EVENTS: ${{ steps.generate.outputs.fallback_events }}
          DETAIL_FAILURES: ${{ steps.generate.outputs.detail_failures }}
        with:
          script: |
            const label = 'calendar-pipeline';
            const failed = process.env.JOB_STATUS === 'failure';
            const degraded = process.env.DEGRADED === 'true';
            const total = process.env.TOTAL_EVENTS;
            const fallback = process.env.FALLBACK_EVENTS;
            const detail = process.env.DETAIL_FAILURES;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo, name: label, color: 'd73a4a',
                description: 'Calendar generation pipeline alerts',
              });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label,
            });
            const issue = open.data[0];

            if (failed || degraded) {
              const kind = failed
                ? 'Hard failure — generation or deploy failed (see logs).'
                : 'Soft degradation — entries fell back to all-day or detail scrapes failed.';
              const body = [
                `**${kind}**`, '',
                `- Run: ${runUrl}`,
                `- total_events: ${total || 'n/a'}`,
                `- fallback_events: ${fallback || 'n/a'}`,
                `- detail_failures: ${detail || 'n/a'}`,
                '',
                'The unofficial Metro planned-works feed/markup may have changed.',
              ].join('\n');
              if (issue) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number, body,
                });
              } else {
                await github.rest.issues.create({
                  ...context.repo,
                  title: '⚠️ Calendar generation needs attention',
                  labels: [label], body,
                });
              }
            } else if (issue) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: `Recovered — clean run. ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo, issue_number: issue.number, state: 'closed',
              });
            }
