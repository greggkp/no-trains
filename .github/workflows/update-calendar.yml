name: Update calendar

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

# Feeds are published straight to GitHub Pages as a build artifact — nothing
# is pushed back to main, so branch protection on main can stay strict.
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest -v

  update:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate ICS feeds
        id: generate
        run: python generate_ics.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Open/update a tracking issue when the pipeline fails hard (any step —
      # generation crash or deploy failure) or quietly degrades (entries fell
      # back to all-day, or detail scrapes failed — usually a sign the
      # unofficial upstream changed). Closes the issue automatically on the
      # next clean run.
      - name: Notify on failure or degradation
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'calendar-pipeline';
            const failed = '${{ job.status }}' === 'failure';
            const degraded = '${{ steps.generate.outputs.degraded }}' === 'true';
            const total = '${{ steps.generate.outputs.total_events }}';
            const fallback = '${{ steps.generate.outputs.fallback_events }}';
            const detail = '${{ steps.generate.outputs.detail_failures }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo, name: label, color: 'd73a4a',
                description: 'Calendar generation pipeline alerts',
              });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label,
            });
            const issue = open.data[0];

            if (failed || degraded) {
              const kind = failed
                ? 'Hard failure — generation or deploy failed (see logs).'
                : 'Soft degradation — entries fell back to all-day or detail scrapes failed.';
              const body = [
                `**${kind}**`, '',
                `- Run: ${runUrl}`,
                `- total_events: ${total || 'n/a'}`,
                `- fallback_events: ${fallback || 'n/a'}`,
                `- detail_failures: ${detail || 'n/a'}`,
                '',
                'The unofficial Metro planned-works feed/markup may have changed.',
              ].join('\n');
              if (issue) {
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number, body,
                });
              } else {
                await github.rest.issues.create({
                  ...context.repo,
                  title: '⚠️ Calendar generation needs attention',
                  labels: [label], body,
                });
              }
            } else if (issue) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: `Recovered — clean run. ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo, issue_number: issue.number, state: 'closed',
              });
            }
